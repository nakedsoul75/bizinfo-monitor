# 기업마당 모니터링 설정
# 수정 후 git push 하면 다음 14시 보고서부터 반영됨
# 룰 변경: rules 섹션 수정 → 자유롭게 추가/삭제

# ===== 회사명 (★ 우선 노출) =====
priority_keywords:
  - "창대"
  - "디엘나인"
  - "DL나인"
  - "DLNINE"
  - "콤마나인"
  - "COMMANINE"
  - "comma9"
  - "팩토리나인"
  - "Factory Nine"
  - "FactoryNine"
  - "factory9"

# ===== 매칭 룰 =====
# type:
#   all     — terms 의 모든 단어가 본문에 포함되어야 매칭 (AND)
#   any     — terms 중 하나라도 포함되면 매칭 (OR)
#   phrase  — terms 중 하나라도 구문(여러 단어 묶음)으로 포함되면 매칭
# exclude:  — 본문에 이 단어가 하나라도 포함되면 매칭 제외 (NOT)
# priority: — true 면 ⭐ 우선 노출 (회사명과 동일 등급)
rules:
  - id: "export_voucher"
    label: "수출 바우처"
    type: "all"
    terms: ["수출", "바우처"]

  - id: "overseas_exhibition"
    label: "해외 전시회 (화장품 제외)"
    type: "all"
    terms: ["해외", "전시회"]
    exclude: ["화장품"]

  - id: "factory_robot"
    label: "공장 로봇"
    type: "all"
    terms: ["공장", "로봇"]

  - id: "factory_automation"
    label: "공장 자동화"
    type: "all"
    terms: ["공장", "자동화"]

  - id: "robot_press_auto"
    label: "로봇·프레스·자동차"
    type: "all"
    terms: ["로봇", "프레스", "자동차"]

  - id: "camping"
    label: "캠핑"
    type: "any"
    terms: ["캠핑"]
    priority: true

  - id: "leisure_hobby"
    label: "레져/취미 산업"
    type: "any"
    terms: ["레져", "레저", "취미"]
    priority: true

  - id: "marketing_support"
    label: "마케팅 지원"
    type: "phrase"
    terms: ["마케팅 지원", "마케팅지원"]

# ===== 매칭 옵션 =====
match:
  case_insensitive: true
  strip_whitespace: true   # "콤마 나인" → "콤마나인" 등 띄어쓰기 변형도 매칭
  fields:
    - "pblancNm"      # 공고명
    - "bsnsSumryCn"   # 사업개요내용
    - "trgetNm"       # 신청대상명
    - "pblancUrl"     # 공고URL

# ===== 알림 정책 =====
notify:
  mode: "new_yesterday"
  send_when_empty: true

# ===== API =====
api:
  endpoint: "https://apis.data.go.kr/1421000/mssBizService_v2/getbizList_v2"
  num_of_rows: 100
  max_pages: 5
  timeout_seconds: 30
